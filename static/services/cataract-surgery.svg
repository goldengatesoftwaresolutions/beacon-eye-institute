<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00549f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001e39;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="orlight" cx="72%" cy="42%" r="38%">
      <stop offset="0%" style="stop-color:#c8e6ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#001e39;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />
  <rect width="800" height="400" fill="url(#orlight)" />
  <!-- Operating room ceiling light (right side) -->
  <g transform="translate(600, 130)">
    <circle cx="0" cy="0" r="110" fill="white" fill-opacity="0.06"/>
    <circle cx="0" cy="0" r="82" fill="white" fill-opacity="0.07"/>
    <circle cx="0" cy="0" r="55" fill="white" fill-opacity="0.08"/>
    <circle cx="0" cy="0" r="28" fill="white" fill-opacity="0.12"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="0" cy="0" r="82" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
    <!-- Mount arm -->
    <line x1="0" y1="-110" x2="0" y2="-160" stroke="white" stroke-opacity="0.4" stroke-width="6" stroke-linecap="round"/>
    <line x1="-30" y1="-148" x2="30" y2="-148" stroke="white" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Eye with IOL implant icon (centered left) -->
  <g transform="translate(248, 195)">
    <!-- Eye outline -->
    <path d="M-120,-40 C-80,-95 80,-95 120,-40 C80,15 -80,15 -120,-40 Z"
          fill="none" stroke="white" stroke-width="4" stroke-opacity="0.9"/>
    <!-- Iris -->
    <circle cx="0" cy="-40" r="32" fill="none" stroke="white" stroke-width="3.5" stroke-opacity="0.9"/>
    <!-- Inner iris ring -->
    <circle cx="0" cy="-40" r="20" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Pupil -->
    <circle cx="0" cy="-40" r="11" fill="white" fill-opacity="0.9"/>
    <!-- IOL haptic arms (characteristic of intraocular lens) -->
    <path d="M32,-40 Q55,-20 48,10" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.75" stroke-linecap="round"/>
    <path d="M-32,-40 Q-55,-20 -48,10" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.75" stroke-linecap="round"/>
    <!-- Incision line (surgical mark) -->
    <line x1="-14" y1="-72" x2="14" y2="-72" stroke="white" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round"/>
  </g>
  <!-- IOL label badge -->
  <g transform="translate(248, 195)">
    <text x="52" y="-34" font-family="monospace" font-size="12" fill="white" fill-opacity="0.55" font-weight="bold">IOL</text>
  </g>
  <!-- Label -->
  <text x="248" y="293" text-anchor="middle"
        font-family="'Open Sans', Arial, sans-serif" font-size="22" font-weight="700"
        fill="white" fill-opacity="0.95">Cataract Surgery</text>
  <text x="248" y="319" text-anchor="middle"
        font-family="'Open Sans', Arial, sans-serif" font-size="14"
        fill="white" fill-opacity="0.7">Lens Replacement &amp; Vision Restoration</text>
  <!-- Medical cross badge -->
  <g transform="translate(728, 52)" fill="white" fill-opacity="0.3">
    <rect x="-22" y="-8" width="44" height="16" rx="3"/>
    <rect x="-8" y="-22" width="16" height="44" rx="3"/>
  </g>
</svg>
