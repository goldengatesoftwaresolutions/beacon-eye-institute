<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001e39;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />
  <!-- Contact lens concentric rings (right side decoration) -->
  <g transform="translate(590, 200)">
    <circle cx="0" cy="0" r="130" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="3"/>
    <circle cx="0" cy="0" r="105" fill="none" stroke="white" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="6,5"/>
    <circle cx="0" cy="0" r="78" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="white" stroke-opacity="0.22" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="28" fill="white" fill-opacity="0.12"/>
    <!-- Lens highlight arc -->
    <path d="M-88,-55 Q-20,-100 52,-55" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Axis lines -->
    <line x1="-130" y1="0" x2="130" y2="0" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="0" y1="-130" x2="0" y2="130" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text text-anchor="middle" y="-140" font-family="monospace" font-size="11" fill="white" fill-opacity="0.55">14.2 mm</text>
  </g>
  <!-- Eye with lens overlay (centered left) -->
  <g transform="translate(240, 190)">
    <!-- Eye outline -->
    <path d="M-120,-40 C-80,-95 80,-95 120,-40 C80,15 -80,15 -120,-40 Z"
          fill="none" stroke="white" stroke-width="4" stroke-opacity="0.9"/>
    <!-- Iris -->
    <circle cx="0" cy="-40" r="32" fill="none" stroke="white" stroke-width="3.5" stroke-opacity="0.9"/>
    <!-- Contact lens rim on iris -->
    <circle cx="0" cy="-40" r="36" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="4,3"/>
    <!-- Pupil -->
    <circle cx="0" cy="-40" r="12" fill="white" fill-opacity="0.9"/>
    <!-- Rx prescription data -->
    <text x="-112" y="26" font-family="monospace" font-size="11" fill="white" fill-opacity="0.65">SPH  CYL   AXIS</text>
    <text x="-112" y="42" font-family="monospace" font-size="11" fill="white" fill-opacity="0.65">-2.50  -0.75  180°</text>
  </g>
  <!-- Label -->
  <text x="240" y="293" text-anchor="middle"
        font-family="'Open Sans', Arial, sans-serif" font-size="22" font-weight="700"
        fill="white" fill-opacity="0.95">Contact Lens Exams</text>
  <text x="240" y="319" text-anchor="middle"
        font-family="'Open Sans', Arial, sans-serif" font-size="14"
        fill="white" fill-opacity="0.7">Fitting, Prescription &amp; Specialty Lenses</text>
  <!-- Medical cross badge -->
  <g transform="translate(728, 52)" fill="white" fill-opacity="0.3">
    <rect x="-22" y="-8" width="44" height="16" rx="3"/>
    <rect x="-8" y="-22" width="16" height="44" rx="3"/>
  </g>
</svg>
