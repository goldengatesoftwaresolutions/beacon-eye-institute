<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00549f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001e39;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />
  <rect width="800" height="400" fill="url(#glow)" />
  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Eye chart visual -->
  <g transform="translate(560, 200)" fill="white" opacity="0.15">
    <text text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" y="-100">E</text>
    <text text-anchor="middle" font-family="monospace" font-weight="bold" font-size="28" y="-60">FP</text>
    <text text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22" y="-26">TOZ</text>
    <text text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" y="2">LPED</text>
    <text text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12" y="24">PECFD</text>
    <text text-anchor="middle" font-family="monospace" font-weight="bold" font-size="9" y="42">EDFCZP</text>
    <text text-anchor="middle" font-family="monospace" font-weight="bold" font-size="7" y="57">FELOPZD</text>
  </g>
  <!-- Eye icon -->
  <g transform="translate(240, 200)">
    <!-- Eye outline -->
    <path d="M-120,-40 C-80,-90 80,-90 120,-40 C80,10 -80,10 -120,-40 Z" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
    <!-- Iris -->
    <circle cx="0" cy="-40" r="28" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
    <!-- Pupil -->
    <circle cx="0" cy="-40" r="12" fill="white" opacity="0.9"/>
    <!-- Eyelid highlights -->
    <path d="M-120,-40 C-80,-90 80,-90 120,-40" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
    <!-- Slit lamp beam -->
    <line x1="-50" y1="-40" x2="50" y2="-40" stroke="#7ec8e3" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
  </g>
  <!-- Label -->
  <g transform="translate(240, 200)">
    <text text-anchor="middle" y="50" font-family="'Open Sans', Arial, sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.95">Comprehensive Eye Exams</text>
    <text text-anchor="middle" y="78" font-family="'Open Sans', Arial, sans-serif" font-size="14" fill="white" opacity="0.7">Vision Testing &amp; Eye Health Screening</text>
  </g>
  <!-- Medical cross badge -->
  <g transform="translate(720, 50)">
    <rect x="-22" y="-8" width="44" height="16" rx="3" fill="white" opacity="0.2"/>
    <rect x="-8" y="-22" width="16" height="44" rx="3" fill="white" opacity="0.2"/>
  </g>
</svg>
