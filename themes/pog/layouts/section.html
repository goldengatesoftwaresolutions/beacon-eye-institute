{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1 class="page-header__title">{{ .Title }}</h1>
    {{ with .Description }}<p class="page-header__desc">{{ . }}</p>{{ end }}
  </div>
</div>
<div class="container section-body">
  {{ with .Content }}<div class="section-intro-content">{{ . }}</div>{{ end }}
  {{ if .Pages }}
    <div class="card-grid">
      {{ range .Pages }}
        <article class="content-card">
          <header class="content-card__header">
            <img
              src="{{ with .Params.image }}{{ . | relURL }}{{ else }}https://picsum.photos/seed/{{ .File.BaseFileName }}/800/400{{ end }}"
              alt="{{ .Title }}"
              class="content-card__image"
              loading="lazy"
            >
          </header>
          <div class="content-card__body">
            <h2 class="content-card__title"><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
            <p class="content-card__blurb">{{ .Description }}</p>
          </div>
          <footer class="content-card__footer">
            <a href="{{ .RelPermalink }}" class="link-arrow">Read More</a>
          </footer>
        </article>
      {{ end }}
    </div>
  {{ end }}
</div>
{{ end }}
